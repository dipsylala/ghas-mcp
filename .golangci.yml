run:
  timeout: 5m
  tests: true
  go: "1.26"

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - unconvert
    - gocyclo
    - prealloc
    - bodyclose
    - noctx
